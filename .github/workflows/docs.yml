name: docs

# Build the Docusaurus site on every relevant change. Deploy to GitHub
# Pages only when the change has landed on `main`. PRs build for
# validation but do not deploy.

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "src/graph_mcp/**"
      - "evals/**"
      - "scripts/generate_docs_reference.py"
      - "scripts/check_docs.py"
      - ".env.example"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs-site/**"
      - "src/graph_mcp/**"
      - "evals/**"
      - "scripts/generate_docs_reference.py"
      - "scripts/check_docs.py"
      - ".env.example"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs-checks:
    name: Reference and coverage checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (for TypeAdapter introspection)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify generated reference fragments are up to date
        run: python scripts/generate_docs_reference.py --check

      - name: Verify docs reference every config var, tool, and resource
        run: python scripts/check_docs.py

  build:
    name: Build site
    needs: docs-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps (for the doc generators)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Regenerate managed reference fragments
        # Idempotent on a clean tree; CI re-runs in case the docs-checks
        # job and the build job land on different runners.
        run: python scripts/generate_docs_reference.py

      - name: Install Node dependencies
        working-directory: docs-site
        run: npm ci

      - name: Typecheck
        working-directory: docs-site
        run: npm run typecheck

      - name: Build
        working-directory: docs-site
        env:
          # Derive the public URL from the repository slug so the same
          # workflow file works for forks. Operators on a custom domain
          # can override these via repository Variables.
          DOCUSAURUS_URL: ${{ vars.DOCUSAURUS_URL }}
          DOCUSAURUS_BASE_URL: ${{ vars.DOCUSAURUS_BASE_URL }}
        run: npm run build

      - name: Verify built site exists
        run: python scripts/check_docs.py --require-build

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
