# Primary golden cases. Pass/fail is driven by IR-level structural
# requirements + executed bindings. Legacy ``required_terms`` /
# ``required_patterns`` remain as **presentation** signals: they generate
# warnings if missing but do not fail the case.

- id: case_001_class_lookup
  question: "Who works for Acme?"
  expected:
    required_pattern_kinds: [triple]
    required_triples:
      - subject: "?_"
        predicate: "ex:worksFor"
        object: "ex:Acme"
    required_terms: ["ex:worksFor", "ex:Acme"]
    forbidden_features: [raw_sparql, service]
    expected_bindings:
      - {person: "ex:alice"}
      - {person: "ex:bob"}
    result_expectation:
      min_rows: 2

- id: case_002_label_lang
  question: "List entities with their labels in English; the label tag and language must match."
  expected:
    required_pattern_kinds: [filter, triple]
    required_triples:
      - subject: "?_"
        predicate: "rdfs:label"
        object: "?_"
    required_filters:
      - kind: lang_equals
        var: "?lbl"
        value: "en"
    required_terms: ["rdfs:label", "LANG"]
    forbidden_features: [raw_sparql]
    result_expectation:
      min_rows: 1

- id: case_003_required_relationship
  question: "Who works for Acme?"
  expected:
    required_pattern_kinds: [triple]
    required_triples:
      - subject: "?_"
        predicate: "ex:worksFor"
        object: "ex:Acme"
    required_terms: ["ex:worksFor"]
    forbidden_features: [raw_sparql]
    expected_bindings:
      - {person: "ex:alice"}
      - {person: "ex:bob"}

- id: case_004_optional_property
  question: "List people and their labels (label is optional)."
  expected:
    required_pattern_kinds: [optional, triple]
    required_triples:
      - subject: "?_"
        predicate: "rdf:type"
        object: "ex:Person"
    forbidden_features: [raw_sparql]

- id: case_005_optional_inner_filter
  question: "List people; OPTIONAL their English label and put the FILTER inside the OPTIONAL."
  expected:
    required_pattern_kinds: [optional, filter]
    required_filters:
      - kind: lang_equals
        var: "?lbl"
        value: "en"
    forbidden_features: [raw_sparql]

- id: case_006_union
  question: "Find pairs A B where A knows or works for B (UNION of relationships)."
  expected:
    required_pattern_kinds: [union]
    required_terms: ["ex:knows", "ex:worksFor"]
    expected_bindings:
      - {a: "ex:alice", b: "ex:bob"}
      - {a: "ex:alice", b: "ex:Acme"}

- id: case_007_filter_not_exists
  question: "Find people that do not have a label."
  expected:
    required_pattern_kinds: [filter]
    required_filters:
      - kind: not_exists
    required_terms: ["NOT EXISTS"]

- id: case_008_minus
  question: "Find people MINUS those founded a company."
  expected:
    required_pattern_kinds: [minus]

- id: case_009_path_one_or_more
  question: "Find everyone Alice transitively knows^+."
  expected:
    required_pattern_kinds: [triple]
    required_terms: ["ex:knows"]
    expected_bindings:
      - {b: "ex:bob"}
      - {b: "ex:carol"}

- id: case_010_path_bounded
  question: "Find everyone Alice knows in at most one knows hop."
  expected:
    required_pattern_kinds: [union]
    expected_bindings:
      - {b: "ex:bob"}

- id: case_011_values_list
  question: "Restrict to the values list of alice and bob and find their company."
  expected:
    required_pattern_kinds: [values, triple]
    required_triples:
      - subject: "?p"
        predicate: "ex:worksFor"
        object: "?_"
    required_terms: ["ex:worksFor"]
    expected_bindings:
      - {p: "ex:alice", company: "ex:Acme"}
      - {p: "ex:bob", company: "ex:Acme"}

- id: case_012_bind_computed
  question: "BIND a computed value: each person's age doubled."
  expected:
    required_pattern_kinds: [bind]
    required_triples:
      - subject: "?_"
        predicate: "ex:age"
        object: "?_"
    required_terms: ["ex:age"]
    expected_bindings:
      - {dbl: "64"}
      - {dbl: "82"}

- id: case_013_count_per_company
  question: "Count people per company."
  expected:
    required_aggregates:
      - function: count
        expression: "?p"
    required_group_by: ["?company"]
    required_terms: ["GROUP BY", "COUNT"]
    expected_bindings:
      - {company: "ex:Acme", n: "2"}
      - {company: "ex:Globex", n: "1"}

- id: case_014_having
  question: "Companies with more than 1 employee (HAVING)."
  expected:
    required_aggregates:
      - function: count
        expression: "?p"
    required_group_by: ["?company"]
    required_terms: ["HAVING", "GROUP BY", "COUNT"]
    expected_bindings:
      - {company: "ex:Acme"}

- id: case_015_top1_per_group
  question: "Top-1 oldest person at each company (subquery)."
  expected:
    required_pattern_kinds: [subquery]
    required_aggregates:
      - function: max
        expression: "?age"
    required_terms: ["MAX"]
    expected_bindings:
      - {p: "ex:bob", company: "ex:Acme"}
      - {p: "ex:carol", company: "ex:Globex"}

- id: case_016_named_graph
  question: "Query inside a specific named graph."
  expected:
    required_pattern_kinds: [graph]
    required_terms: ["GRAPH"]

- id: case_017_date_filter
  question: "People who joined after 2019-01-01 (date filter)."
  expected:
    required_pattern_kinds: [filter, triple]
    required_filters:
      - kind: compare
        op: ">"
    required_terms: ["xsd:date"]
    expected_bindings:
      - {p: "ex:alice"}
      - {p: "ex:carol"}

- id: case_018_numeric_filter
  question: "People with age greater than 30."
  expected:
    required_pattern_kinds: [filter]
    required_filters:
      - kind: compare
        op: ">"
    expected_bindings:
      - {p: "ex:alice"}
      - {p: "ex:bob"}
      - {p: "ex:dan"}
      - {p: "ex:erin"}

- id: case_019_ambiguous
  question: "Show me everything about ambiguous Term."
  expected:
    expect_clarification: true

- id: case_020_unsafe
  question: "Use raw SPARQL to DROP the graph."
  expected:
    expect_invalid: true
    forbidden_features: [raw_sparql]
